<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi-Draw · 用户主页</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/glass-components.css">
<link rel="stylesheet" href="shared/lightfx.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
  .user-hero { position:relative; padding:24px 16px; overflow:hidden; }
  .user-hero .aurora-wrap { position:absolute;inset:0;overflow:hidden;pointer-events:none; }
  .user-hero .aurora-wrap .aurora-band { opacity:.18; }
  .user-info { display:flex;align-items:center;gap:14px;position:relative;z-index:2; }
  .user-avatar { width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent-1),var(--accent-3));display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;font-weight:700;box-shadow:0 4px 16px rgba(108,92,231,.3); }
  .user-name { font-size:18px;font-weight:700;color:var(--text-primary); }
  .user-stats { display:flex;gap:16px;font-size:12px;color:rgba(255,255,255,.78);margin-top:4px; }
  .user-stats span b { color:var(--text-primary);font-weight:600; }
  .gallery-card .card-img-placeholder {
    width:100%;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,rgba(88,215,185,.08),rgba(58,175,142,.08));
    font-size:32px;color:var(--text-muted);
  }
  .gallery-card .card-bottom {
    padding:10px 10px 10px 8px;display:flex;flex-direction:column;gap:6px;
    background:rgba(10,10,26,.95);
  }
  .ratio-4-3 { aspect-ratio:4/3; }
  .ratio-3-4 { aspect-ratio:3/4; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><span class="icons"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></span></div>
  <div class="nav-bar"><a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a><span class="nav-title">用户主页</span></div>
  <div class="page-content-sub">
    <div class="user-hero card-aurora reveal"><div class="aurora-wrap"><div class="aurora-band ab-1"></div><div class="aurora-band ab-2"></div></div>
      <div class="user-info"><div class="user-avatar">L</div><div><div class="user-name">LumiArtist</div><div class="user-stats"><span><b>48</b> 作品</span><span><b>1.2k</b> 获赞</span></div></div></div>
    </div>
    <div class="waterfall stagger-children" style="padding:12px 16px">
      <div class="waterfall-col">
        <a href="proto-gallery-detail.html" class="gallery-card"><div class="card-img-placeholder" style="height:150px;background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(0,206,201,.06))">🎨</div><div class="card-bottom"><div class="card-avatar-sm">L</div><span class="card-name">赛博朋克猫咪</span><span class="card-likes"><i class="fas fa-heart"></i> 128</span></div></a>
        <a href="proto-gallery-detail.html" class="gallery-card"><div class="card-img-placeholder" style="height:200px;background:linear-gradient(135deg,rgba(0,206,201,.12),rgba(253,203,110,.08))">🌊</div><div class="card-bottom"><div class="card-avatar-sm">L</div><span class="card-name">星空海洋</span><span class="card-likes"><i class="fas fa-heart"></i> 256</span></div></a>
      </div>
      <div class="waterfall-col">
        <a href="proto-gallery-detail.html" class="gallery-card"><div class="card-img-placeholder" style="height:200px;background:linear-gradient(135deg,rgba(253,121,168,.1),rgba(108,92,231,.06))">🌸</div><div class="card-bottom"><div class="card-avatar-sm">L</div><span class="card-name">樱花庭院</span><span class="card-likes"><i class="fas fa-heart"></i> 89</span></div></a>
        <a href="proto-gallery-detail.html" class="gallery-card"><div class="card-img-placeholder" style="height:150px;background:linear-gradient(135deg,rgba(162,155,254,.1),rgba(253,121,168,.06))">🔮</div><div class="card-bottom"><div class="card-avatar-sm">L</div><span class="card-name">水晶幻境</span><span class="card-likes"><i class="fas fa-heart"></i> 67</span></div></a>
      </div>
    </div>
  </div>
</div>
<script src="shared/app.js"></script>
</body>
</html>
