<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi-Draw · 生成结果</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/glass-components.css">
<link rel="stylesheet" href="shared/lightfx.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
  .result-page { padding:16px;text-align:center; }
  .result-image-wrap { position:relative;border-radius:var(--radius-lg);overflow:hidden;margin-bottom:20px; }
  .result-image-wrap .flow-border { position:absolute;inset:0;border-radius:inherit;padding:2px;pointer-events:none;background:conic-gradient(from var(--flow-angle),transparent 15%,var(--accent-1) 40%,var(--accent-3) 50%,transparent 70%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:flow-rot 3s linear infinite; }
  .result-image {
    width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,rgba(108,92,231,.12),rgba(0,206,201,.08));
    font-size:80px;color:var(--text-muted);
  }
  .result-meta { font-size:12px;color:var(--text-muted);margin-top:8px; }
  .result-actions { display:flex;gap:12px;padding:16px; }
  .result-actions a,.result-actions button { flex:1; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><span class="icons"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></span></div>
  <div class="nav-bar"><a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a><span class="nav-title">创作完成</span></div>
  <div class="page-content-sub">
    <div class="result-page">
      <div class="result-image-wrap card-flow reveal" style="position:relative">
        <div class="flow-border"></div>
        <a href="proto-image-preview.html" class="result-image">🚀</a>
      </div>
      <div class="result-meta reveal">Nano Banana 2.0 · 1:1 · 赛博朋克 · 消耗 3 积分</div>
      <div class="result-actions reveal">
        <button class="btn-primary" onclick="showToast('已保存到相册')"><i class="fas fa-download"></i> 保存</button>
        <button class="btn-glass" onclick="showToast('已发布到画廊')"><i class="fas fa-share"></i> 发布</button>
      </div>
      <div class="result-actions reveal">
        <a href="proto-create.html" class="btn-small" style="text-align:center"><i class="fas fa-rotate"></i> 重新生成</a>
        <a href="proto-create.html" class="btn-small" style="text-align:center"><i class="fas fa-sliders"></i> 修改参数</a>
      </div>
    </div>
  </div>
</div>
<script src="shared/app.js"></script>
</body>
</html>
