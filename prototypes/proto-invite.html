<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi-Draw · 邀请好友</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/glass-components.css">
<link rel="stylesheet" href="shared/lightfx.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
  .invite-page { padding:16px; }
  .invite-hero { position:relative;padding:24px;border-radius:var(--radius-lg);background:var(--glass-bg);border:1px solid var(--glass-border);overflow:hidden;text-align:center;margin-bottom:20px; }
  .invite-hero .aurora-wrap { position:absolute;inset:0;overflow:hidden;pointer-events:none; }
  .invite-hero .aurora-wrap .aurora-band { opacity:.15; }
  .invite-hero .invite-icon { font-size:48px;margin-bottom:12px;color:var(--accent-1);position:relative;z-index:2; }
  .invite-hero .invite-title { font-size:18px;font-weight:700;color:var(--text-primary);position:relative;z-index:2; }
  .invite-hero .invite-desc { font-size:13px;color:var(--text-secondary);margin-top:6px;position:relative;z-index:2; }
  .code-card { position:relative;padding:20px;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);overflow:hidden;text-align:center; }
  .code-card .flow-border { position:absolute;inset:0;border-radius:inherit;padding:2px;pointer-events:none;background:conic-gradient(from var(--flow-angle),transparent 15%,var(--accent-1) 40%,var(--accent-3) 50%,transparent 70%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:flow-rot 3s linear infinite; }
  .invite-code { font-size:32px;font-weight:700;color:var(--text-primary);letter-spacing:8px;position:relative;z-index:2; }
  .invite-code-label { font-size:11px;color:var(--text-muted);margin-top:8px;position:relative;z-index:2; }
  .copy-btn { margin-top:12px;position:relative;z-index:2; }
  .rules-section { padding:16px 0; }
  .rule-item { display:flex;gap:12px;padding:10px 0;font-size:13px; }
  .rule-item .rule-icon { width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;background:rgba(108,92,231,.1);color:var(--accent-1); }
  .rule-item .rule-text { color:var(--text-secondary); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><span class="icons"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></span></div>
  <div class="nav-bar"><a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a><span class="nav-title">邀请好友</span></div>
  <div class="page-content-sub">
    <div class="invite-page">
      <div class="invite-hero card-aurora reveal">
        <div class="aurora-wrap"><div class="aurora-band ab-1"></div><div class="aurora-band ab-2"></div></div>
        <div class="invite-icon"><i class="fas fa-user-plus"></i></div>
        <div class="invite-title">邀请好友，双方各得 20 积分</div>
        <div class="invite-desc">每邀请一位好友首次创作，即可获得积分奖励</div>
      </div>
      <!-- 邀请码卡片 -->
      <div class="code-card card-flow reveal" style="position:relative">
        <div class="flow-border"></div>
        <div class="invite-code">LUMI7X</div>
        <div class="invite-code-label">你的专属邀请码</div>
        <button class="btn-small copy-btn" onclick="showToast('邀请码已复制到剪贴板')"><i class="fas fa-copy"></i> 复制邀请码</button>
      </div>
      <!-- 邀请规则 -->
      <div class="rules-section reveal">
        <div class="rule-item"><div class="rule-icon"><i class="fas fa-1"></i></div><div class="rule-text">分享邀请码给好友</div></div>
        <div class="rule-item"><div class="rule-icon"><i class="fas fa-2"></i></div><div class="rule-text">好友注册时填写你的邀请码</div></div>
        <div class="rule-item"><div class="rule-icon"><i class="fas fa-3"></i></div><div class="rule-text">好友首次创作后，双方各得 20 积分</div></div>
      </div>
      <!-- 分享按钮 -->
      <div class="reveal" style="padding:0 0 16px">
        <button class="btn-primary" onclick="showToast('生成邀请海报...')" style="width:100%"><i class="fas fa-share"></i> 分享给好友</button>
      </div>
    </div>
  </div>
</div>
<script src="shared/app.js"></script>
</body>
</html>
