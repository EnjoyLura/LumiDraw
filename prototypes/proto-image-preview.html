<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi-Draw · 图片预览</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/glass-components.css">
<link rel="stylesheet" href="shared/lightfx.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
  body { background:#000;justify-content:center;align-items:center;padding:0; }
  .preview-frame { width:var(--phone-width);height:var(--phone-height);background:#000;border-radius:40px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center; }
  .preview-image {
    width:90%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,rgba(108,92,231,.12),rgba(0,206,201,.08));
    font-size:80px;color:rgba(255,255,255,.3);border-radius:var(--radius-md);
  }
  .preview-close {
    position:absolute;top:50px;left:16px;width:36px;height:36px;border-radius:50%;
    background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;
    font-size:18px;color:rgba(255,255,255,.7);cursor:pointer;z-index:10;
    backdrop-filter:blur(20px);transition:background .3s;
  }
  .preview-close:hover { background:rgba(255,255,255,.2); }
  .preview-bottom {
    position:absolute;bottom:40px;left:0;right:0;display:flex;justify-content:center;z-index:10;
  }
  .preview-save {
    padding:12px 40px;border-radius:100px;font-size:14px;font-weight:600;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.08);
    color:rgba(255,255,255,.9);cursor:pointer;backdrop-filter:blur(20px);
    transition:all .3s;display:flex;align-items:center;gap:8px;
  }
  .preview-save:hover { background:rgba(255,255,255,.2); }
</style>
</head>
<body>
<div class="preview-frame">
  <!-- 星尘漂浮背景 -->
  <div class="stardust-wrap" style="position:absolute;inset:0;opacity:.15" id="stardustBg"></div>
  
  <a href="javascript:history.back()" class="preview-close"><i class="fas fa-xmark"></i></a>
  <div class="preview-image">🚀</div>
  <div class="preview-bottom">
    <button class="preview-save" onclick="showToast('已保存到相册')"><i class="fas fa-download"></i> 保存到相册</button>
  </div>
</div>
<script src="shared/app.js"></script>
<script>
// 生成背景星尘粒子
const wrap = document.getElementById('stardustBg');
const colors = ['rgba(108,92,231,0.5)', 'rgba(162,155,254,0.3)', 'rgba(255,255,255,0.4)', 'rgba(0,206,201,0.4)'];
const anims = ['sdf0', 'sdf1', 'sdf2'];
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'sd-particle';
  const sz = Math.random() * 2 + 0.5;
  const c = colors[Math.floor(Math.random() * colors.length)];
  const a = anims[Math.floor(Math.random() * anims.length)];
  p.style.cssText = `width:${sz}px;height:${sz}px;left:${(Math.random()*100).toFixed(1)}%;top:${(Math.random()*100).toFixed(1)}%;background:${c};box-shadow:0 0 ${sz*2}px ${c};opacity:.5;animation:${a} ${Math.random()*5+3}s ease-in-out infinite;`;
  wrap.appendChild(p);
}
</script>
</body>
</html>
