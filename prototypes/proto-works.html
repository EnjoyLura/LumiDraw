<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi-Draw · 作品</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/glass-components.css">
<link rel="stylesheet" href="shared/lightfx.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
  .works-header { padding: 16px 16px 0; position:relative; z-index:2; }
  .works-header h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .works-header .manage-btn {
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer; padding: 6px 12px; border-radius: 8px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    transition: all .3s;
  }
  .works-header .manage-btn:hover { background: var(--glass-hover); color: var(--text-primary); }
  .works-tabs { margin: 12px 16px; }
  .works-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 16px; }
  .works-item {
    position: relative; border-radius: var(--radius-sm);
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    overflow: hidden; cursor: pointer; transition: all .3s;
  }
  .works-item:hover { transform: scale(1.02); border-color: rgba(255,255,255,.12); }
  .works-item .item-img {
    width: 100%; aspect-ratio: 1; display: flex;
    align-items: center; justify-content: center;
    font-size: 24px; color: var(--text-muted);
  }
  .works-item .item-meta { padding: 6px 8px; }
  .works-item .item-model { font-size: 10px; color: var(--text-muted); }
  .works-item .item-time { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="status-bar">
    <span class="time">9:41</span>
    <span class="icons"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></span>
  </div>
  <div class="ambient-bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
  <div class="noise-overlay"></div>

  <div class="page-content">
    <div class="works-header reveal" style="display:flex;justify-content:space-between;align-items:center">
      <h1>作品</h1>
      <div class="manage-btn" onclick="showToast('进入管理模式')">管理</div>
    </div>

    <div class="works-tabs reveal">
      <div class="glass-tabs">
        <div class="glass-tab active" data-tab="history">历史作品</div>
        <div class="glass-tab" data-tab="published">已发布</div>
        <div class="glass-tab" data-tab="collected">收藏夹</div>
      </div>
    </div>

    <!-- 历史作品 -->
    <div class="tab-panel" data-panel="history">
      <div class="works-grid stagger-children">
        <a href="proto-works-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(0,206,201,.06))">🚀</div>
          <div class="item-meta">
            <div class="item-model">Nano Banana 2.0</div>
            <div class="item-time">今天 14:30</div>
          </div>
        </a>
        <a href="proto-works-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(253,121,168,.1),rgba(108,92,231,.06))">🌸</div>
          <div class="item-meta">
            <div class="item-model">Seedream 4.0</div>
            <div class="item-time">今天 12:15</div>
          </div>
        </a>
        <a href="proto-works-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(0,206,201,.1),rgba(253,203,110,.06))">🌊</div>
          <div class="item-meta">
            <div class="item-model">混元大模型</div>
            <div class="item-time">昨天 20:00</div>
          </div>
        </a>
        <a href="proto-works-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(162,155,254,.1),rgba(253,121,168,.06))">🔮</div>
          <div class="item-meta">
            <div class="item-model">GPT-Image-1</div>
            <div class="item-time">昨天 18:30</div>
          </div>
        </a>
        <a href="proto-works-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(253,203,110,.08),rgba(85,239,196,.06))">✨</div>
          <div class="item-meta">
            <div class="item-model">Nano Banana Pro</div>
            <div class="item-time">6月9日</div>
          </div>
        </a>
        <a href="proto-works-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(85,239,196,.08),rgba(108,92,231,.06))">🌿</div>
          <div class="item-meta">
            <div class="item-model">Seedream 4.5</div>
            <div class="item-time">6月8日</div>
          </div>
        </a>
      </div>
    </div>

    <!-- 已发布 -->
    <div class="tab-panel" data-panel="published" style="display:none">
      <div class="works-grid stagger-children">
        <a href="proto-works-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(108,92,231,.1),rgba(0,206,201,.06))">🚀</div>
          <div class="item-meta">
            <div class="item-model">128赞 · 56收藏</div>
          </div>
        </a>
        <a href="proto-works-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(253,121,168,.1),rgba(108,92,231,.06))">🌸</div>
          <div class="item-meta">
            <div class="item-model">89赞 · 34收藏</div>
          </div>
        </a>
      </div>
    </div>

    <!-- 收藏夹 -->
    <div class="tab-panel" data-panel="collected" style="display:none">
      <div class="works-grid stagger-children">
        <a href="proto-gallery-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(0,206,201,.1),rgba(253,203,110,.06))">🌊</div>
          <div class="item-meta">
            <div class="item-model">by AquaVision</div>
          </div>
        </a>
        <a href="proto-gallery-detail.html" class="works-item">
          <div class="item-img" style="background:linear-gradient(135deg,rgba(162,155,254,.1),rgba(253,121,168,.06))">🦋</div>
          <div class="item-meta">
            <div class="item-model">by DreamWeaver</div>
          </div>
        </a>
      </div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab-item" data-page="proto-gallery.html"><i class="fas fa-images"></i><span>画廊</span></div>
    <div class="tab-item" data-page="proto-inspiration.html"><i class="fas fa-lightbulb"></i><span>灵感</span></div>
    <div class="tab-item tab-create" data-page="proto-create.html"><div class="create-icon"><i class="fas fa-wand-magic-sparkles"></i></div><span class="tab-label">创作</span></div>
    <div class="tab-item active" data-page="proto-works.html"><i class="fas fa-folder"></i><span>作品</span></div>
    <div class="tab-item" data-page="proto-profile.html"><i class="fas fa-user"></i><span>我的</span></div>
  </div>
</div>

<script src="shared/app.js"></script>
</body>
</html>
