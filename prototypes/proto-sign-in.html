<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi-Draw · 签到</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/glass-components.css">
<link rel="stylesheet" href="shared/lightfx.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
  .signin-page { padding:16px; }
  .signin-header { text-align:center;margin-bottom:20px; }
  .signin-header .signin-title { font-size:20px;font-weight:700;color:var(--text-primary); }
  .signin-header .signin-desc { font-size:13px;color:var(--text-secondary);margin-top:6px; }
  .signin-header .signin-streak { font-size:24px;font-weight:200;color:var(--accent-3);margin-top:12px;letter-spacing:-1px; }
  .signin-header .signin-streak b { font-weight:700; }
  /* 日历 */
  .calendar { margin:0 auto;max-width:320px; }
  .calendar-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:12px; }
  .calendar-month { font-size:16px;font-weight:600;color:var(--text-primary); }
  .calendar-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:4px; }
  .calendar-day-label { text-align:center;font-size:10px;color:var(--text-muted);padding:6px 0; }
  .calendar-day {
    text-align:center;padding:8px 0;border-radius:8px;font-size:13px;color:var(--text-secondary);
    cursor:default;transition:all .3s;
  }
  .calendar-day.empty { background:transparent; }
  .calendar-day.signed {
    background:rgba(0,206,201,.1);color:var(--accent-3);
    border:1px solid rgba(0,206,201,.18);
  }
  .calendar-day.signed::after { content:'✓';font-size:8px;display:block;color:var(--accent-3); }
  .calendar-day.today {
    background:rgba(108,92,231,.1);color:var(--accent-1);
    border:1px solid rgba(108,92,231,.18);
  }
  .calendar-day.future { color:var(--text-muted); }
  /* 奖励 */
  .reward-row { display:flex;gap:12px;margin-top:20px; }
  .reward-card {
    flex:1;padding:12px;border-radius:var(--radius-sm);text-align:center;
    background:var(--glass-bg);border:1px solid var(--glass-border);
  }
  .reward-card .reward-days { font-size:14px;font-weight:700;color:var(--text-primary); }
  .reward-card .reward-points { font-size:12px;color:var(--accent-5);margin-top:4px; }
  /* 签到按钮 */
  .signin-btn-area { padding:16px;position:sticky;bottom:0;background:rgba(10,10,15,.8);backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);z-index:20;text-align:center; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><span class="icons"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></span></div>
  <div class="nav-bar"><a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a><span class="nav-title">每日签到</span></div>
  <div class="page-content-sub">
    <div class="signin-page">
      <div class="signin-header reveal">
        <div class="signin-title">每日签到</div>
        <div class="signin-desc">连续签到获得更多积分奖励</div>
        <div class="signin-streak">已连续签到 <b>3</b> 天</div>
      </div>
      <!-- 日历 -->
      <div class="calendar reveal">
        <div class="calendar-header">
          <div class="calendar-month">2026年6月</div>
        </div>
        <div class="calendar-grid">
          <div class="calendar-day-label">一</div>
          <div class="calendar-day-label">二</div>
          <div class="calendar-day-label">三</div>
          <div class="calendar-day-label">四</div>
          <div class="calendar-day-label">五</div>
          <div class="calendar-day-label">六</div>
          <div class="calendar-day-label">日</div>
          <div class="calendar-day empty"></div>
          <div class="calendar-day signed">1</div>
          <div class="calendar-day signed">2</div>
          <div class="calendar-day signed">3</div>
          <div class="calendar-day signed">4</div>
          <div class="calendar-day">5</div>
          <div class="calendar-day">6</div>
          <div class="calendar-day">7</div>
          <div class="calendar-day">8</div>
          <div class="calendar-day signed">9</div>
          <div class="calendar-day signed">10</div>
          <div class="calendar-day today">11</div>
          <div class="calendar-day future">12</div>
          <div class="calendar-day future">13</div>
          <div class="calendar-day future">14</div>
          <div class="calendar-day future">15</div>
          <div class="calendar-day future">16</div>
          <div class="calendar-day future">17</div>
          <div class="calendar-day future">18</div>
          <div class="calendar-day future">19</div>
          <div class="calendar-day future">20</div>
          <div class="calendar-day future">21</div>
          <div class="calendar-day future">22</div>
          <div class="calendar-day future">23</div>
          <div class="calendar-day future">24</div>
          <div class="calendar-day future">25</div>
          <div class="calendar-day future">26</div>
          <div class="calendar-day future">27</div>
          <div class="calendar-day future">28</div>
          <div class="calendar-day future">29</div>
          <div class="calendar-day future">30</div>
        </div>
      </div>
      <!-- 奖励里程碑 -->
      <div class="reward-row reveal">
        <div class="reward-card"><div class="reward-days">7天</div><div class="reward-points">+5 积分</div></div>
        <div class="reward-card"><div class="reward-days">14天</div><div class="reward-points">+10 积分</div></div>
        <div class="reward-card"><div class="reward-days">30天</div><div class="reward-points">+30 积分</div></div>
      </div>
    </div>
    <!-- 签到按钮 -->
    <div class="signin-btn-area reveal">
      <button class="btn-primary btn-breathe" id="signinBtn" onclick="doSignin()">
        <i class="fas fa-calendar-check"></i> 今日签到 +2积分
      </button>
    </div>
  </div>
</div>
<script src="shared/app.js"></script>
<script>
function doSignin() {
  const btn = document.getElementById('signinBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-check-circle"></i> 已签到';
  btn.style.opacity = '.6';
  btn.classList.remove('btn-breathe');
  showToast('签到成功！获得 +2 积分');
  // 撒花效果
  for(let i=0;i<15;i++){
    const p=document.createElement('div');
    p.className='sd-particle';
    const colors=['var(--accent-4)','var(--accent-1)','var(--accent-5)','var(--accent-3)'];
    const sz=Math.random()*3+1;
    const c=colors[Math.floor(Math.random()*colors.length)];
    p.style.cssText=`width:${sz}px;height:${sz}px;left:50%;top:40%;background:${c};box-shadow:0 0 ${sz*2}px ${c};opacity:1;position:absolute;z-index:99;animation:sdf1 ${Math.random()*2+1}s ease-out forwards;`;
    document.querySelector('.phone-frame').appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}
</script>
</body>
</html>
