<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi-Draw · 模板详情</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/glass-components.css">
<link rel="stylesheet" href="shared/lightfx.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
  .carousel { position:relative;overflow:hidden;border-radius:var(--radius-md);background:var(--glass-bg);border:1px solid var(--glass-border);margin:16px;height:200px; }
  .carousel-slide { width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:60px;color:var(--text-muted);transition:opacity .5s; }
  .carousel-dots { display:flex;gap:6px;justify-content:center;padding:8px 0; }
  .carousel-dot { width:6px;height:6px;border-radius:50%;background:var(--glass-border);cursor:pointer;transition:all .3s; }
  .carousel-dot.active { background:var(--accent-1);width:18px;border-radius:3px;animation:breathe 2s ease-in-out infinite; }
  .template-info { padding:16px; }
  .template-info .template-title { font-size:20px;font-weight:700;color:var(--text-primary); }
  .template-info .template-desc { font-size:14px;color:var(--text-secondary);line-height:1.6;margin-top:8px; }
  .prompt-display { padding:14px 16px;border-radius:var(--radius-sm);background:rgba(108,92,231,.06);border:1px solid rgba(108,92,231,.12);margin:16px;font-size:13px;color:var(--text-secondary);line-height:1.7; }
  .prompt-display .placeholder { color:var(--accent-1);font-weight:600;background:rgba(108,92,231,.1);padding:2px 6px;border-radius:4px; }
  .use-btn-area { padding:16px;position:sticky;bottom:0;background:rgba(10,10,15,.8);backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);z-index:20; }
  .use-btn { position:relative;overflow:hidden;width:100%;padding:16px;border-radius:100px;font-size:16px;font-weight:700;text-align:center;cursor:pointer;background:var(--glass-bg);border:none;display:flex;align-items:center;justify-content:center;gap:8px; }
  .use-btn .flow-border { position:absolute;inset:0;border-radius:inherit;padding:2px;pointer-events:none;background:conic-gradient(from var(--flow-angle),transparent 15%,var(--accent-1) 40%,var(--accent-3) 50%,transparent 70%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;animation:flow-rot 3s linear infinite; }
  .use-btn .btn-inner { position:relative;z-index:2;background:linear-gradient(135deg,var(--accent-1),var(--accent-3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><span class="icons"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></span></div>
  <div class="nav-bar"><a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a><span class="nav-title">模板详情</span></div>
  <div class="page-content-sub">
    <!-- 轮播 -->
    <div class="carousel reveal" id="carousel">
      <div class="carousel-slide" style="background:linear-gradient(135deg,rgba(108,92,231,.12),rgba(0,206,201,.08))">👤</div>
    </div>
    <div class="carousel-dots reveal">
      <div class="carousel-dot active"></div>
      <div class="carousel-dot" onclick="showToast('示例图 2')"></div>
      <div class="carousel-dot" onclick="showToast('示例图 3')"></div>
    </div>
    <div class="template-info reveal">
      <div class="template-title">赛博朋克头像</div>
      <div class="template-desc">生成独特的赛博朋克风格AI头像，霓虹灯、机械元素、未来感十足。适合做社交媒体头像和个性展示。</div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <span class="glass-badge badge-purple">Nano Banana 2.0</span>
        <span class="glass-badge badge-cyan">人像</span>
        <span class="glass-badge badge-gold">2.3k 使用</span>
      </div>
    </div>
    <!-- Prompt模板 -->
    <div class="prompt-display reveal">
      <div style="font-size:11px;color:var(--accent-1);margin-bottom:6px;font-weight:600">Prompt 模板</div>
      A <span class="placeholder">{{人物描述}}</span> wearing cyberpunk style outfit, neon lights background, <span class="placeholder">{{配饰}}</span> mechanical parts, futuristic city, 4K high quality, detailed
    </div>
    <!-- 使用按钮 -->
    <div class="use-btn-area reveal">
      <a href="proto-create.html?template=cyberpunk-avatar" class="use-btn btn-flow">
        <div class="flow-border"></div>
        <span class="btn-inner"><i class="fas fa-wand-magic-sparkles"></i> 使用模板创作</span>
      </a>
    </div>
  </div>
</div>
<script src="shared/app.js"></script>
</body>
</html>
