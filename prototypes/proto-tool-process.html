<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumi-Draw · AI工具处理</title>
<link rel="stylesheet" href="shared/base.css">
<link rel="stylesheet" href="shared/glass-components.css">
<link rel="stylesheet" href="shared/lightfx.css">
<link rel="stylesheet" href="shared/animations.css">
<style>
  .tool-process-page { padding:16px; }
  .process-step { text-align:center;padding:8px 0; }
  .process-step .step-icon { font-size:48px;margin-bottom:16px;color:var(--text-muted); }
  .process-step .step-title { font-size:18px;font-weight:600;color:var(--text-primary); }
  .process-step .step-desc { font-size:13px;color:var(--text-secondary);margin-top:8px; }
  .upload-zone {
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:40px 24px;border-radius:var(--radius-md);
    background:var(--glass-bg);border:1px dashed var(--glass-border);
    cursor:pointer;transition:all .3s;gap:12px;
  }
  .upload-zone:hover { background:var(--glass-hover);border-color:var(--accent-1); }
  .upload-zone i { font-size:32px;color:var(--text-muted); }
  .upload-zone span { font-size:14px;color:var(--text-secondary); }
  .process-progress {
    position:relative;overflow:hidden;padding:24px;border-radius:var(--radius-md);
    background:var(--glass-bg);border:1px solid var(--glass-border);
    text-align:center;
  }
  .process-progress .aurora-wrap { position:absolute;inset:0;overflow:hidden;pointer-events:none; }
  .process-progress .progress-spinner {
    width:40px;height:40px;border-radius:50%;margin:0 auto 16px;
    border:3px solid var(--glass-border);border-top-color:var(--accent-1);
    animation:spin 1s linear infinite;
  }
  .process-progress .progress-text { font-size:16px;color:var(--text-primary);font-weight:600; }
  .process-progress .progress-sub { font-size:12px;color:var(--text-muted);margin-top:6px; }
  .process-result { text-align:center;padding:16px; }
  .result-image {
    width:100%;aspect-ratio:4/3;border-radius:var(--radius-md);
    background:linear-gradient(135deg,rgba(0,206,201,.12),rgba(108,92,231,.08));
    display:flex;align-items:center;justify-content:center;
    font-size:60px;color:var(--text-muted);margin-bottom:16px;
  }
  .result-actions { display:flex;gap:12px;margin-top:16px; }
  .result-actions .btn { flex:1; }
  .state-upload,.state-processing,.state-result { display:none; }
  .state-upload.active,.state-processing.active,.state-result.active { display:block; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span class="time">9:41</span><span class="icons"><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></span></div>
  <div class="nav-bar"><a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a><span class="nav-title">AI抠图</span></div>
  <div class="page-content-sub">
    <div class="tool-process-page">
      <!-- 上传态 -->
      <div class="state-upload active" id="stateUpload">
        <div class="process-step reveal">
          <div class="step-icon"><i class="fas fa-scissors" style="color:var(--accent-3)"></i></div>
          <div class="step-title">AI智能抠图</div>
          <div class="step-desc">上传图片，AI自动去除背景，2 积分/次</div>
        </div>
        <div class="upload-zone reveal" onclick="switchState('processing')">
          <i class="fas fa-cloud-arrow-up"></i>
          <span>点击上传或拖拽图片到这里</span>
        </div>
      </div>
      <!-- 处理态 -->
      <div class="state-processing" id="stateProcessing">
        <div class="process-progress card-aurora">
          <div class="aurora-wrap"><div class="aurora-band ab-1" style="opacity:.15"></div><div class="aurora-band ab-2" style="opacity:.1"></div></div>
          <div class="progress-spinner"></div>
          <div class="progress-text">AI正在处理...</div>
          <div class="progress-sub">预计 5-10 秒完成</div>
          <div style="margin-top:16px"><div class="glass-progress"><div class="progress-bar" id="progressBar" style="width:60%"></div></div></div>
        </div>
        <div style="text-align:center;margin-top:20px">
          <button class="btn-small" onclick="switchState('result')">模拟完成（跳转结果）</button>
        </div>
      </div>
      <!-- 结果态 -->
      <div class="state-result" id="stateResult">
        <div class="process-result reveal">
          <div class="result-image">👤 <span style="font-size:20px;position:absolute;bottom:8px;right:8px;background:rgba(0,206,201,.2);padding:4px 8px;border-radius:8px;color:var(--accent-3)">✓ 背景已移除</span></div>
          <div style="font-size:14px;color:var(--text-primary);font-weight:600;margin-top:8px">抠图完成！</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:4px">消耗 2 积分 · 余额 228 积分</div>
        </div>
        <div class="result-actions reveal">
          <button class="btn-primary" onclick="showToast('已保存到相册')"><i class="fas fa-download"></i> 保存</button>
          <button class="btn-glass" onclick="showToast('已保存到作品')"><i class="fas fa-folder"></i> 存作品</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="shared/app.js"></script>
<script>
function switchState(state) {
  document.querySelectorAll('.state-upload,.state-processing,.state-result').forEach(el => el.classList.remove('active'));
  if (state === 'upload') document.getElementById('stateUpload').classList.add('active');
  if (state === 'processing') {
    document.getElementById('stateProcessing').classList.add('active');
    let w = 0;
    const bar = document.getElementById('progressBar');
    const timer = setInterval(() => { w += 5; bar.style.width = w + '%'; if (w >= 100) clearInterval(timer); }, 200);
  }
  if (state === 'result') document.getElementById('stateResult').classList.add('active');
}
</script>
</body>
</html>
